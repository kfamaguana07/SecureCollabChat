version: '3.8'
services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: kevin
      POSTGRES_PASSWORD: espe123
      POSTGRES_DB: SecureCollabChat
    ports:
      - "5432:5432"
    volumes:
      # Mapeo del script para que se ejecute al iniciar la DB
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: